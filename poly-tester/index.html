<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyTester - Strategy Performance Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #222; }
        h1 { font-size: 2rem; }
        .subtitle { color: #666; font-size: 0.9rem; margin-top: 5px; }
        
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #10b981; color: #000; }
        .btn-primary:hover { background: #059669; transform: translateY(-1px); }
        .btn-secondary { background: #1f2937; color: #fff; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .stat-card { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .stat-value { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .stat-label { color: #666; font-size: 0.85rem; }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        
        .section { background: #111; padding: 24px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #222; }
        .section-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1f2937; }
        th { color: #666; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        tr:hover { background: #0a0a0a; }
        
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-open { background: #1e3a5f; color: #60a5fa; }
        .badge-won { background: #1e3a2f; color: #10b981; }
        .badge-lost { background: #3a1e1e; color: #ef4444; }
        
        .strategy-row { display: grid; grid-template-columns: 1fr 100px 100px 120px 100px; gap: 16px; padding: 16px; border-bottom: 1px solid #1f2937; }
        .strategy-name { font-weight: 600; }
        
        .refresh { text-align: center; color: #666; margin-top: 20px; font-size: 0.85rem; }
        
        .loader { border: 3px solid #1f2937; border-top: 3px solid #10b981; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🧪 PolyTester</h1>
                <p class="subtitle">Strategy Performance Dashboard</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="loadAll()">↻ Refresh</button>
                <button class="btn btn-primary" onclick="runTest()">▶ Run Tests</button>
            </div>
        </header>
        
        <div class="stats-grid" id="overview-stats">
            <!-- Stats loaded here -->
        </div>
        
        <div class="section">
            <h2 class="section-title">Strategy Performance</h2>
            <div id="strategy-performance">
                <!-- Performance loaded here -->
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">Recent Trades</h2>
            <table id="trades-table">
                <thead>
                    <tr>
                        <th>Strategy</th>
                        <th>Market</th>
                        <th>Position</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>P/L</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="trades-body">
                    <!-- Trades loaded here -->
                </tbody>
            </table>
        </div>
        
        <p class="refresh">Last updated: <span id="last-update">-</span></p>
    </div>

    <script>
        async function loadAll() {
            await Promise.all([
                loadStats(),
                loadPerformance(),
                loadTrades()
            ]);
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        }
        
        async function loadStats() {
            const res = await fetch('https://poly-tester-api.onrender.com/api/trades');
            const trades = await res.json();
            
            const open = trades.filter(t => t.status === 'open').length;
            const won = trades.filter(t => t.status === 'won').length;
            const lost = trades.filter(t => t.status === 'lost').length;
            const total = trades.length;
            const pnl = trades.reduce((sum, t) => sum + (t.profit_loss || 0), 0);
            const winRate = total > 0 ? ((won / (won + lost)) * 100).toFixed(1) : 0;
            
            document.getElementById('overview-stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">Total Trades</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${open}</div>
                    <div class="stat-label">Open Positions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${winRate}%</div>
                    <div class="stat-label">Win Rate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value ${pnl >= 0 ? 'positive' : 'negative'}">$${pnl.toFixed(2)}</div>
                    <div class="stat-label">Total P/L</div>
                </div>
            `;
        }
        
        async function loadPerformance() {
            const res = await fetch('https://poly-tester-api.onrender.com/api/performance');
            const perf = await res.json();
            
            // Group by strategy
            const strategies = {};
            perf.forEach(p => {
                if (!strategies[p.strategy_id]) {
                    strategies[p.strategy_id] = {
                        total_trades: 0,
                        wins: 0,
                        losses: 0,
                        total_pnl: 0
                    };
                }
                strategies[p.strategy_id].total_trades += p.total_trades;
                strategies[p.strategy_id].wins += p.wins;
                strategies[p.strategy_id].losses += p.losses;
                strategies[p.strategy_id].total_pnl += parseFloat(p.total_pnl || 0);
            });
            
            const strategyNames = ['Arbitrage', 'Market Maker', 'Contrarian', 'Momentum', 'Value', 'Information'];
            
            document.getElementById('strategy-performance').innerHTML = 
                Object.entries(strategies).map(([id, s]) => {
                    const winRate = s.total_trades > 0 ? ((s.wins / s.total_trades) * 100).toFixed(1) : 0;
                    const name = strategyNames[id - 1] || `Strategy ${id}`;
                    
                    return `
                        <div class="strategy-row">
                            <div class="strategy-name">${name}</div>
                            <div>${s.total_trades} trades</div>
                            <div>${winRate}% win</div>
                            <div class="${s.total_pnl >= 0 ? 'positive' : 'negative'}">$${s.total_pnl.toFixed(2)}</div>
                            <div>${s.wins}W / ${s.losses}L</div>
                        </div>
                    `;
                }).join('') || '<p style="color:#666;text-align:center;padding:20px;">No data yet</p>';
        }
        
        async function loadTrades() {
            const res = await fetch('https://poly-tester-api.onrender.com/api/trades');
            const trades = await res.json();
            
            const strategyNames = ['Arbitrage', 'Market Maker', 'Contrarian', 'Momentum', 'Value', 'Information'];
            
            document.getElementById('trades-body').innerHTML = trades.slice(0, 50).map(t => `
                <tr>
                    <td>${strategyNames[t.strategy_id - 1] || t.strategy_id}</td>
                    <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;">${t.market_id || 'Unknown'}</td>
                    <td>${t.position.toUpperCase()}</td>
                    <td>${(t.entry_price * 100).toFixed(0)}%</td>
                    <td>${t.exit_price ? (t.exit_price * 100).toFixed(0) + '%' : '-'}</td>
                    <td class="${t.profit_loss >= 0 ? 'positive' : 'negative'}">
                        ${t.profit_loss ? '$' + t.profit_loss.toFixed(2) : '-'}
                    </td>
                    <td><span class="badge badge-${t.status}">${t.status.toUpperCase()}</span></td>
                </tr>
            `).join('') || '<tr><td colspan="7" style="text-align:center;color:#666;">No trades yet</td></tr>';
        }
        
        async function runTest() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Running...';
            
            await fetch('https://poly-tester-api.onrender.com/api/run-test', { method: 'POST' });
            
            alert('Test started! Check back in 30 seconds.');
            
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = '▶ Run Tests';
                loadAll();
            }, 30000);
        }
        
        // Load on start
        loadAll();
        
        // Auto-refresh every 30 seconds
        setInterval(loadAll, 30000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyTester - Strategy Performance</title>
    <style>
        * { margin: 0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0a0a0a; color:#fff; padding:20px; }
        .container { max-width:1200px; margin:0 auto; }
        
        header { margin-bottom:30px; padding-bottom:20px; border-bottom:1px solid #222; }
        h1 { font-size:1.8rem; margin-bottom:5px; }
        .subtitle { color:#666; font-size:0.85rem; }
        
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax:150px,1fr)); gap:16px; margin-bottom:30px; }
        .stat-card { background:#111; padding:20px; border-radius:12px; border:1px solid #222; }
        .stat-value { font-size:2rem; font-weight:700; margin-bottom:8px; }
        .stat-label { color:#666; font-size:0.8rem; }
        .positive { color:#10b981; }
        .negative { color:#ef4444; }
        
        .section { background:#111; padding:24px; border-radius:12px; margin-bottom:20px; border:1px solid #222; }
        .section-title { font-size:1.3rem; font-weight:600; margin-bottom:20px; }
        
        .strategy-row { display:grid; grid-template-columns:1fr 80px 80px 100px 100px; gap:16px; padding:16px; border-bottom:1px solid #1f2937; align-items:center; }
        .strategy-name { font-weight:600; }
        
        table { width:100%; border-collapse:collapse; }
        th,td { padding:12px; text-align:left; border-bottom:1px solid #1f2937; }
        th { color:#666; font-size:0.8rem; font-weight:600; text-transform:uppercase; }
        
        .badge { padding:4px 12px; border-radius:20px; font-size:0.75rem; font-weight:600; }
        .badge-won { background:#1e3a2f; color:#10b981; }
        .badge-lost { background:#3a1e1e; color:#ef4444; }
        .badge-open { background:#1e3a5f; color:#60a5fa; }
        
        .btn { padding:12px 24px; border:none; border-radius:8px; font-weight:600; cursor:pointer; background:#10b981; color:#000; }
        .btn:hover { background:#059669; }
        
        .updated { text-align:center; color:#666; margin-top:20px; font-size:0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧪 PolyTester</h1>
            <p class="subtitle">Prediction Market Strategy Performance Tracker</p>
        </header>
        
        <div class="stats-grid" id="stats"></div>
        
        <div class="section">
            <h2 class="section-title">Strategy Performance</h2>
            <div id="strategies"></div>
        </div>
        
        <div class="section">
            <h2 class="section-title">Recent Trades</h2>
            <table id="trades-table">
                <thead>
                    <tr>
                        <th>Strategy</th>
                        <th>Market</th>
                        <th>Pos</th>
                        <th>Entry</th>
                        <th>P/L</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="trades"></tbody>
            </table>
        </div>
        
        <p class="updated">Last updated: <span id="last-update"></span></p>
    </div>

    <script>
        // Simulated data (in real version, this comes from Supabase)
        const strategies = [
            { name:'Arbitrage', trades:47, wins:28, losses:19, pnl:387.50 },
            { name:'Market Maker', trades:156, wins:98, losses:58, pnl:612.00 },
            { name:'Contrarian', trades:38, wins:14, losses:24, pnl:-285.00 },
            { name:'Momentum', trades:52, wins:31, losses:21, pnl:220.00 },
            { name:'Value', trades:29, wins:17, losses:12, pnl:195.00 },
            { name:'Information', trades:41, wins:26, losses:15, pnl:312.00 }
        ];
        
        const trades = [
            { strategy:'Market Maker', market:'BTC $100k 2024', pos:'No', entry:65, pnl:35, status:'won' },
            { strategy:'Arbitrage', market:'Trump 2024', pos:'Yes', entry:52, pnl:-100, status:'lost' },
            { strategy:'Value', market:'Fed Rate Cut June', pos:'No', entry:28, pnl:72, status:'won' },
            { strategy:'Contrarian', market:'ETH Flip BTC', pos:'No', entry:92, pnl:8, status:'won' },
            { strategy:'Information', market:'Oil $100 2024', pos:'Yes', entry:42, pnl:-100, status:'lost' },
            { strategy:'Momentum', market:'Recession 2024', pos:'Yes', entry:30, pnl:133, status:'won' },
            { strategy:'Market Maker', market:'AI Regulation', pos:'No', entry:75, pnl:25, status:'won' },
            { strategy:'Arbitrage', market:'OpenAI IPO', pos:'No', entry:85, pnl:-100, status:'lost' },
            { strategy:'Value', market:'Dem Senate', pos:'No', entry:65, pnl:54, status:'won' },
            { strategy:'Information', market:'Apple Car', pos:'No', entry:78, pnl:22, status:'won' }
        ];
        
        function render() {
            const totalTrades = strategies.reduce((s,x) => s + x.trades, 0);
            const totalWins = strategies.reduce((s,x) => s + x.wins, 0);
            const totalLosses = strategies.reduce((s,x) => s + x.losses, 0);
            const totalPnl = strategies.reduce((s,x) => s + x.pnl, 0);
            const winRate = ((totalWins / (totalWins + totalLosses)) * 100).toFixed(1);
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalTrades}</div>
                    <div class="stat-label">Total Trades</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${winRate}%</div>
                    <div class="stat-label">Win Rate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalWins}</div>
                    <div class="stat-label">Wins</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalLosses}</div>
                    <div class="stat-label">Losses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value ${totalPnl >= 0 ? 'positive' : 'negative'}">$${totalPnl.toFixed(2)}</div>
                    <div class="stat-label">Total P/L</div>
                </div>
            `;
            
            document.getElementById('strategies').innerHTML = strategies.map(s => {
                const wr = ((s.wins / s.trades) * 100).toFixed(1);
                return `
                    <div class="strategy-row">
                        <div class="strategy-name">${s.name}</div>
                        <div>${s.trades}</div>
                        <div>${wr}%</div>
                        <div>${s.wins}W/${s.losses}L</div>
                        <div class="${s.pnl >= 0 ? 'positive' : 'negative'}">$${s.pnl.toFixed(2)}</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('trades').innerHTML = trades.map(t => `
                <tr>
                    <td>${t.strategy}</td>
                    <td>${t.market}</td>
                    <td>${t.pos}</td>
                    <td>${t.entry}%</td>
                    <td class="${t.pnl >= 0 ? 'positive' : 'negative'}">$${t.pnl}</td>
                    <td><span class="badge badge-${t.status}">${t.status.toUpperCase()}</span></td>
                </tr>
            `).join('');
            
            document.getElementById('last-update').textContent = new Date().toLocaleString();
        }
        
        render();
        setInterval(render, 30000);
    </script>
</body>
</html>
